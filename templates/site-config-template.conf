# Site Configuration Template
# Copy to sites/<client-slug>.conf and customize
# All variables referenced by module render.sh scripts

# === Site Identity ===
SITE_DOMAIN=""          # e.g., example.com
SITE_URL=""             # e.g., https://example.com (no trailing /)
SITE_NAME=""            # e.g., "Example Loan Network"
SITE_PREFIX=""          # lowercase, used in function names — e.g., "eln"
SITE_SLUG=""            # used for directory names — e.g., "eln"

# === SSH/Hosting ===
SSH_HOST=""             # e.g., example.ssh.wpengine.net
SSH_USER=""             # e.g., examplenetwork
SSH_KEY_PATH=""         # full path to SSH key
WP_PATH=""              # e.g., /nas/content/live/example/
MU_PLUGINS_PATH=""      # WP_PATH + wp-content/mu-plugins/

# === Brand ===
PRIMARY_COLOR=""        # hex, e.g., "#1F4E79"
SECONDARY_COLOR=""      # hex
LOGO_URL=""             # full URL to logo image
SITE_PHONE=""           # e.g., "1-800-555-0100" (or empty)

# === Content Configuration ===
CONFIG_URLS_FILE=""     # path to PHP file returning site's llms-config URL array
FORM_PAGE_SLUG=""       # slug of form/application page to skip in FAQ schema

# === Authors (if applicable) ===
PRIMARY_AUTHOR_ID=""    # WP user ID
PRIMARY_AUTHOR_NAME=""

# === NMLS / Compliance (mortgage sites only) ===
NMLS_NUMBER=""          # leave blank if not a mortgage site
LICENSE_DISCLAIMER=""   # any required regulatory disclaimer

# === AI Provider Configuration ===
AI_PROVIDER="openai"                    # openai or anthropic
AI_MODEL="gpt-4o-mini"                  # specific model
AI_API_KEY_ENV_VAR="OPENAI_API_KEY"     # env var name holding key
AI_MAX_RETRIES="3"
AI_REQUEST_TIMEOUT="30"

# === Module Toggles ===
TECHNICAL_SEO_ENABLED=true
QA_GATES_ENABLED=true
LLM_INFRASTRUCTURE_ENABLED=true
SCHEMA_ENABLED=true           # v1.1: FAQ schema, schema cleaner, org ID
LINKING_ENABLED=true           # v1.1: link injector, dedup tools
LINKING_V2_ENABLED=false       # v1.2: AI-powered anchor pools
REDIRECTS_ENABLED=true         # v1.1: redirect engine, 410 handler, force indexing
ANALYTICS_ENABLED=true         # v1.1: analytics head, form submit guard

# === Analytics (v1.1) ===
GTM_CONTAINER_ID=""            # Google Tag Manager container ID (e.g., GTM-XXXXXXXX)
META_PIXEL_ID=""               # Facebook/Meta Pixel ID (empty = skip)
LEAD_FORM_ID=""                # Gravity Forms lead form ID (empty = form guard inactive)

# === Linking v2 (Anchor Pools) ===
ANCHOR_POOL_SIZE_MIN="15"
ANCHOR_POOL_SIZE_MAX="25"
ANCHOR_POOL_PATH=""             # path to anchor pool JSON (per site)

# === Rank Logic Visual Identity ===
RL_PRIMARY_COLOR=""            # hex, e.g., "#1a365d" — overrides --rl-primary
RL_ACCENT_COLOR=""             # hex, e.g., "#f97316" — overrides --rl-accent
RL_FONT_BODY="system-ui"      # body font family
RL_FONT_HEADING="Poppins"     # heading font family

# === Service Tier ===
SERVICE_TIER="Growth"   # Starter, Growth, Pro, Premium
