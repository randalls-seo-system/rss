# Site Configuration Template
# Copy to sites/<client-slug>.conf and customize
# All variables referenced by modules/technical-seo/render.sh

# === Site Identity ===
SITE_DOMAIN=""          # e.g., example.com
SITE_URL=""             # e.g., https://example.com (no trailing /)
SITE_NAME=""            # e.g., "Example Loan Network"
SITE_PREFIX=""          # lowercase, used in function names — e.g., "eln"
SITE_SLUG=""            # used for directory names — e.g., "eln"

# === SSH/Hosting ===
SSH_HOST=""             # e.g., example.ssh.wpengine.net
SSH_USER=""             # e.g., examplenetwork
SSH_KEY_PATH=""         # full path to SSH key
WP_PATH=""              # e.g., /nas/content/live/example/
MU_PLUGINS_PATH=""      # WP_PATH + wp-content/mu-plugins/

# === Brand ===
PRIMARY_COLOR=""        # hex, e.g., "#1F4E79"
SECONDARY_COLOR=""      # hex
LOGO_URL=""             # full URL to logo image
SITE_PHONE=""           # e.g., "1-800-555-0100" (or empty)

# === Content Configuration ===
CONFIG_URLS_FILE=""     # path to PHP file returning site's llms-config URL array
                        # (relative to repo root or absolute)
                        # See sites/valn-llms-urls.php for format example
FORM_PAGE_SLUG=""       # slug of form/application page to skip in markdown conversion
                        # (empty = no page skipped)

# === Authors (if applicable) ===
PRIMARY_AUTHOR_ID=""    # WP user ID
PRIMARY_AUTHOR_NAME=""

# === NMLS / Compliance (mortgage sites only) ===
NMLS_NUMBER=""          # leave blank if not a mortgage site
LICENSE_DISCLAIMER=""   # any required regulatory disclaimer

# === Module Toggles ===
TECHNICAL_SEO_ENABLED=true
QA_GATES_ENABLED=true
LLM_INFRASTRUCTURE_ENABLED=true

# === Service Tier ===
SERVICE_TIER="Growth"   # Starter, Growth, Pro, Premium
