intent: decision
display_name: "Decision Article"
spec_reference: "docs/article-spec.md Section 1, Section 6.6"

# When to include BLUF (Section 8.1)
bluf_default: include

# Body structural element preference (Section 9.4)
body_default: tables_dominant

# Card slot definitions (Section 6.6)
card_slots:
  - role: option_a_card
    h3_pattern: "{Option A} at a Glance"
    bullet_label_hints:
      - "Key advantage:"
      - "Best suited for:"
      - "Watch for:"
      - "Bottom line:"
  - role: option_b_card
    h3_pattern: "{Option B} at a Glance"
    bullet_label_hints:
      - "Key advantage:"
      - "Best suited for:"
      - "Watch for:"
      - "Bottom line:"
  - role: who_picks_a_card
    h3_pattern: "When {Option A} Wins"
    bullet_label_hints:
      - "Ideal scenario:"
      - "Financial trigger:"
      - "Timeline factor:"
      - "Main takeaway:"
  - role: who_picks_b_card
    h3_pattern: "When {Option B} Wins"
    bullet_label_hints:
      - "Ideal scenario:"
      - "Financial trigger:"
      - "Timeline factor:"
      - "Main takeaway:"

# Callout type preferences per section role (Section 10.5)
# Values are archetype-neutral — archetype YAML maps these to actual callout labels
callout_preferences:
  high_stakes_section: ["numerical_proof", "reality_check"]
  comparison_section: ["reality_check"]
  scenario_section: ["situational_example"]

# Default ATF FAQ patterns when SERP PAA is empty (Section 7.2 fallback)
default_atf_faq_patterns:
  - "What is the difference between {Option A} and {Option B}?"
  - "Which is better: {Option A} or {Option B}?"
  - "When should I choose {Option A} over {Option B}?"

# Default H2 question/statement mix (Section 9.2.2)
question_h2_floor_when_paa_sparse: 0
question_h2_floor_when_paa_rich: 30
