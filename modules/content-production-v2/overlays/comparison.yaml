intent: comparison
display_name: "Comparison Article"
spec_reference: "docs/article-spec.md Section 1, Section 6.6"

# When to include BLUF (Section 8.1)
bluf_default: include

# Body structural element preference (Section 9.4)
body_default: tables_dominant

# Card slot definitions (Section 6.6)
card_slots:
  - role: top_pick_card
    h3_pattern: "Top Pick: {Winner}"
    bullet_label_hints:
      - "Standout feature:"
      - "Best for:"
      - "Limitation:"
      - "Bottom line:"
  - role: runner_up_card
    h3_pattern: "Runner-Up: {Second}"
    bullet_label_hints:
      - "Key strength:"
      - "Best for:"
      - "Trade-off:"
      - "Worth noting:"
  - role: niche_card
    h3_pattern: "Best for {Niche Use Case}"
    bullet_label_hints:
      - "Unique advantage:"
      - "Ideal user:"
      - "Caveat:"
      - "Main takeaway:"
  - role: methodology_card
    h3_pattern: "How We Scored"
    bullet_label_hints:
      - "Primary factor:"
      - "Secondary factor:"
      - "Tiebreaker:"
      - "Worth noting:"

# Callout type preferences per section role (Section 10.5)
# Values are archetype-neutral — archetype YAML maps these to actual callout labels
callout_preferences:
  high_stakes_section: ["numerical_proof"]
  methodology_section: ["authority_note"]
  comparison_section: ["reality_check"]
  scenario_section: ["situational_example"]

# Default ATF FAQ patterns when SERP PAA is empty (Section 7.2 fallback)
default_atf_faq_patterns:
  - "What is the best {Topic} in {Year}?"
  - "How did we rank the {Topic} options?"
  - "What should I look for when choosing {Topic}?"

# Default H2 question/statement mix (Section 9.2.2)
question_h2_floor_when_paa_sparse: 0
question_h2_floor_when_paa_rich: 30
